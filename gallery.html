<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya in Pictures - CSS Grid Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- I used AI to help create this responsive gallery. This code uses CSS Grid to arrange images into 3, 2, and 1 column layouts depending on screen size. -->
    <header class="page-header">
        <nav class="simple-nav">
            <a class="logo" href="layout.html">FastSend</a>
            <a href="layout.html">Landing Page</a>
            <a href="sticky-nav.html">Sticky Nav</a>
        </nav>
        <h1>Kenya in Pictures</h1>
        <p>Beautiful scenes inspired by Kenya's landscapes, cities, culture, and everyday life.</p>
    </header>

    <main class="gallery-wrapper">
        <section class="gallery-grid" aria-label="Kenya photo gallery">
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=1" alt="Scenic Kenyan landscape">
                <figcaption>Nairobi city energy</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=2" alt="Kenyan coastal scene">
                <figcaption>Mombasa coastal breeze</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=3" alt="Rural road in Kenya">
                <figcaption>Rural innovation journeys</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=4" alt="Market scene in Kenya">
                <figcaption>Local market connections</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=5" alt="Mountain landscape">
                <figcaption>Highland productivity</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=6" alt="People using technology">
                <figcaption>Digital payments in action</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=7" alt="Sunset over open land">
                <figcaption>Evening trade routes</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=8" alt="Busy street scene">
                <figcaption>Small business growth</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="https://picsum.photos/400/300?random=9" alt="Calm nature scene">
                <figcaption>Connected communities</figcaption>
            </figure>
        </section>
    </main>
</body>
</html>
